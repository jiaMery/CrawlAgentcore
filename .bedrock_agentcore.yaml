default_agent: create_agent
agents:
  create_agent:
    name: create_agent
    language: python
    node_version: '20'
    entrypoint: src/main.py
    deployment_type: container
    runtime_type: null
    platform: linux/arm64
    container_runtime: docker
    source_path: /home/ubuntu/mjj-pjt/CrawlAgentcore
    aws:
      execution_role: null
      execution_role_auto_create: false
      account: '${AWS_ACCOUNT_ID}'
      region: '${AWS_REGION:-us-east-1}'
      ecr_repository: '${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-east-1}.amazonaws.com/crawler-agentcore'
      ecr_auto_create: false
      s3_path: null
      s3_auto_create: false
      network_configuration:
        network_mode: PUBLIC
      # Browser tool env vars (injected into Runtime container)
      # BROWSER_ID is set via environmentVariables in update_agent_runtime
        network_mode_config: null
      protocol_configuration:
        server_protocol: HTTP
      observability:
        enabled: true
      lifecycle_configuration:
        idle_runtime_session_timeout: null
        max_lifetime: null
    bedrock_agentcore:
      agent_id: '${AGENTCORE_RUNTIME_ID}'
      agent_arn: '${AGENTCORE_RUNTIME_ARN}'
      agent_session_id: null
      endpoint_name: '${AGENTCORE_ENDPOINT_NAME:-crawlerEndpoint}'
      endpoint_arn: '${AGENTCORE_ENDPOINT_ARN}'
    codebuild:
      project_name: null
      execution_role: null
      source_bucket: null
    memory:
      mode: NO_MEMORY
      memory_id: null
      memory_arn: null
      memory_name: null
      event_expiry_days: 30
      first_invoke_memory_check_done: false
      was_created_by_toolkit: false
    identity:
      credential_providers: []
      workload: null
    aws_jwt:
      enabled: false
      audiences: []
      signing_algorithm: ES384
      issuer_url: null
      duration_seconds: 300
    authorizer_configuration: null
    request_header_configuration: null
    oauth_configuration: null
    api_key_env_var_name: null
    api_key_credential_provider_name: null
    is_generated_by_agentcore_create: false
